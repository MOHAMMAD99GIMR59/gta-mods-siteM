<style>
body{
  margin:0;
  font-family:'Vazirmatn',sans-serif;
  background:#050816;
  color:white;
}
/* HEADER */
  <header class="navbar">
  <h1>GTA MODS</h1>

  <nav>
  <div class="search-box">
  <input type="text" placeholder="جستجوی مود GTA...">
</div>
    <a href="#">مودها</a>
    <a href="#">دانلود</a>
    <a href="#">گرافیک</a>
    <a href="#">اسکریپت</a>
  </nav>
</header>
/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  background:radial-gradient(circle,#0a0f2c,#050816);
}

.hero h2{
  font-size:40px;
  color:#00e5ff;
  text-shadow:0 0 20px #00e5ff;
}

.btn{
  display:inline-block;
  padding:12px 25px;
  margin-top:15px;
  background:linear-gradient(45deg,#00e5ff,#7c4dff);
  border-radius:12px;
  color:white;
  text-decoration:none;
  box-shadow:0 0 20px #00e5ff;
}

/* CATEGORY BUTTONS */
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:20px;
}

.cat-btn{
  padding:10px 18px;
  border-radius:12px;
  background:#0f1433;
  border:1px solid #1f2a5a;
  color:#00e5ff;
  box-shadow:0 0 10px #00e5ff22;
}

/* MOD CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
  
  .card{
  background:#0b0f2a;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 20px #000;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px #00e5ff55;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card h3{
  color:#00e5ff;
}

.download-btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:linear-gradient(45deg,#00e5ff,#7c4dff);
  color:white;
  text-decoration:none;
header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(10,12,30,0.6);
  backdrop-filter:blur(15px);
  border-bottom:1px solid #1f2a5a;
}

header h1{
  color:#00e5ff;
  text-shadow:0 0 15px #00e5ff;
}

nav a{
  color:#00e5ff;
  text-decoration:none;
  margin:0 10px;
  font-size:14px;
}

nav a:hover{
  text-shadow:0 0 10px #00e5ff;
}
